name: Publish Android SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build & publish to local staging
        run: ./gradlew :himetrica:publishReleasePublicationToStagingRepository -PVERSION_NAME=${{ inputs.version }}
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Bundle and upload to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          cd himetrica/build/staging-deploy
          zip -r ../../../bundle.zip .
          cd ../../..

          # Build Bearer token (base64 of username:password)
          TOKEN=$(printf '%s:%s' "$OSSRH_USERNAME" "$OSSRH_PASSWORD" | base64 -w0)

          # Upload to Central Portal
          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $TOKEN" \
            --form bundle=@bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=com.himetrica.tracker:himetrica-android:${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "android-v${{ inputs.version }}" \
            --title "Android SDK v${{ inputs.version }}" \
            --notes "Himetrica Android SDK v${{ inputs.version }}"
